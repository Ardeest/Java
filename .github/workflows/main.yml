name: Run Java Tests (Ant)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Ant
        run: sudo apt-get update && sudo apt-get install -y ant

      - name: Run tests
        run: ant test
